<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories on a Magnet Upload</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#e8b1af;
  margin:0;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  background:white;
  max-width:500px;
  width:95%;
  padding:30px 20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}
h1{
  font-size:40px;
  margin-bottom:35px;
}

/* Select Photos Button */
#selectPhotosBtn {
  display: inline-block;
  background-color: #e8b1af; /* button color */
  color: #fff;               /* text color */
  padding: 10px 20px;        /* size of button */
  font-size: 22px;           /* text size */
  border-radius: 18px;       /* rounded corners */
  cursor: pointer;
  width: 85%;                /* width of button */
  max-width: 400px;          /* prevents it from getting too huge on desktop */
  text-align: center;
  margin-bottom: 25px;
  margin-left: auto;
  margin-right: auto;
  transition: all 0.2s ease;
}

/* Optional hover effect */
#selectPhotosBtn:hover {
  opacity: 0.9;
}

button{background:#c2d2c1;color:#fff;border:none;padding:12px 20px;font-size:12px;border-radius:20px;cursor:pointer;
  text-align: center;
  margin-bottom: 25px;}

/* Preview image Styles */
#previewContainer img{
  margin-top:10px;
  border-radius:12px;
  width:300px;

  border: 2px solid #f1f1f1;   /* subtle light border */
  background: #fff;            /* ensures clean edge */
  box-shadow: 0 4px 10px rgba(0,0,0,0.08); /* soft shadow */
}
/* NAME INPUT field Styles */
input[type=text]{padding:8px;font-size:26px;width:90%;border-radius:14px;border:1px solid #ccc;margin-top:25px;}

/* Submit Photos Button Styles */
#submitPhotos {
  display: none;           /* keep hidden until images are selected */
  font-size: 26px;         /* text size */
  font-weight: bold;       /* make text bold */
  padding: 15px 35px;      /* vertical and horizontal spacing */
  border-radius: 18px;     /* rounded corners */
  width: 90%;              /* button width, can adjust to 100% or smaller */
  max-width: 400px;        /* optional max width */
  margin: 25px auto 0;     /* spacing above button and center horizontally */
  text-align: center;      
  background-color: #e8b1af; /* button background color */
  color: #fff;             /* text color */
  border: none;            /* remove default border */
  cursor: pointer;         /* pointer on hover */
  transition: all 0.3s ease; /* smooth hover effect */
}

/* Optional: Hover Effect */
#submitPhotos:hover {
  background-color: #45a049;
}

/* Upload Status Message Styles */
#uploadStatus {
  display: none;            /* hidden by default */
  margin-top: 15px;         /* spacing above the message */
  font-weight: bold;        /* bold text */
  font-size: 22px;          /* text size, adjust as needed */
  color: #ff2a6d;           /* text color, change to any color you like */
  text-align: center;       /* center the text */
}
</style>
</head>

<body>

<div class="container">
<h1>Stories on a Magnet</h1>

<label id="selectPhotosBtn">
  SELECT PHOTOS
</label>

<input type="file" id="photoInput" accept="image/*" style="display:none;" multiple>

<div id="previewContainer"></div>

<!-- Added Name Input -->
<input type="text" id="customerName" placeholder="Enter Your Name">

<br><br>
<button id="submitPhotos">SUBMIT PHOTOS</button>
<p id="uploadStatus">Uploading... Do not leave this page.</p>

<div id="cropModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999;padding:20px;text-align:center;">
  <h2>Edit Photo</h2>
  <div id="imageContainer"></div>
  <br><br>
  <button id="saveCrop">Save Crop</button>
</div>

</div>

<script>
let cropper = null;
let currentImageElement = null;

const input = document.getElementById("photoInput");
const preview = document.getElementById("previewContainer");
const imageContainer = document.getElementById("imageContainer");
const customerNameInput = document.getElementById("customerName");

// Open file picker
document.getElementById("selectPhotosBtn").onclick = () => {
  input.value = "";
  input.click();
};

// Handle file selection
input.addEventListener("change", (e) => {
  // 1️⃣ Hide original SELECT PHOTOS button
document.getElementById("selectPhotosBtn").style.display = "none";

// 2️⃣ Create ADD MORE PHOTOS button if it doesn't exist
let addMoreBtn = document.getElementById("addMorePhotosBtn");
if (!addMoreBtn) {
  addMoreBtn = document.createElement("button");
  addMoreBtn.id = "addMorePhotosBtn";
  addMoreBtn.innerText = "ADD MORE PHOTOS";
  addMoreBtn.style.display = "inline-block";
  addMoreBtn.style.background = "#e8b1af";
  addMoreBtn.style.color = "#fff";
  addMoreBtn.style.padding = "10px 30px";
  addMoreBtn.style.fontSize = "18px";
  addMoreBtn.style.borderRadius = "16px";
  addMoreBtn.style.cursor = "pointer";
  addMoreBtn.style.marginTop = "20px";

  // Add click handler
  addMoreBtn.onclick = () => {
    input.click();  // open file picker again
  };

  // Insert into page above previewContainer
  document.querySelector(".container").insertBefore(addMoreBtn, document.getElementById("previewContainer"));
}
  // preview.innerHTML = ""; // <-- comment this out for “add more photos”
  document.getElementById("submitPhotos").style.display = "inline-block";

  Array.from(e.target.files).forEach(file => {

    const wrapper = document.createElement("div");
wrapper.style.marginTop = "25px";
wrapper.style.display = "flex";
wrapper.style.flexDirection = "column";
wrapper.style.alignItems = "center";

    const img = document.createElement("img");

const reader = new FileReader();
reader.onload = function(event) {
  const tempImg = new Image();
  tempImg.src = event.target.result;

  tempImg.onload = function() {
    const size = Math.min(tempImg.width, tempImg.height);

    const canvas = document.createElement("canvas");
    canvas.width = 1200;
    canvas.height = 1200;

    const ctx = canvas.getContext("2d");

    // Center crop calculation
    const sx = (tempImg.width - size) / 2;
    const sy = (tempImg.height - size) / 2;

    ctx.drawImage(
      tempImg,
      sx, sy, size, size,   // source crop (center square)
      0, 0, 1200, 1200      // output size
    );

    img.src = canvas.toDataURL("image/jpeg", 0.95);
  };
};

reader.readAsDataURL(file);

    const btn = document.createElement("button");
    btn.innerText = "CROP IMAGE";

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "DELETE PHOTO";
    const buttonRow = document.createElement("div");
buttonRow.style.display = "flex";
buttonRow.style.justifyContent = "center";
buttonRow.style.gap = "10px";
buttonRow.style.marginTop = "10px";
btn.innerText = "EDIT CROP";
btn.style.background = "#c2d2c1";
btn.style.fontSize = "12px";
btn.style.padding = "8px 14px";
btn.style.borderRadius = "14px";
btn.style.cursor = "pointer";

deleteBtn.innerText = "DELETE";
deleteBtn.style.background = "#ff6b6b";
deleteBtn.style.fontSize = "12px";
deleteBtn.style.padding = "8px 14px";
deleteBtn.style.borderRadius = "14px";
deleteBtn.style.cursor = "pointer";

    deleteBtn.onclick = () => {
  wrapper.remove();

  const remainingImages = document.querySelectorAll("#previewContainer img");

  if (remainingImages.length === 0) {
    // Reset to "home state"
    document.getElementById("submitPhotos").style.display = "none";
    customerNameInput.value = "";

    // Show original SELECT PHOTOS button again
    document.getElementById("selectPhotosBtn").style.display = "inline-block";

    // Remove ADD MORE PHOTOS button if it exists
    const addMore = document.getElementById("addMorePhotosBtn");
    if (addMore) addMore.remove();
  }
};

    btn.onclick = () => {
      // Scoped variables per click
      const fileCopy = file;
      const imgCopy = img;

      if (cropper) {
        cropper.destroy();
        cropper = null;
      }

      imageContainer.innerHTML = "";

      const reader = new FileReader();
      reader.onload = function(event) {
        const newImg = document.createElement("img");
        newImg.style.maxWidth = "75%";
        newImg.style.maxHeight = "60vh";
        newImg.style.display = "block";
        newImg.style.margin = "0 auto";
        newImg.style.borderRadius = "12px";
        newImg.src = event.target.result;

        imageContainer.appendChild(newImg);
        document.getElementById("cropModal").style.display = "block";

        setTimeout(() => {
          cropper = new Cropper(newImg, {
            aspectRatio: 1,
            viewMode: 1,
            dragMode: "move",
            autoCropArea: 1,
            cropBoxMovable: false,
            cropBoxResizable: false,
            movable: true,
            zoomable: true,
            background: false
          });
          currentImageElement = imgCopy;
        }, 200);
      };
      reader.readAsDataURL(fileCopy);
    };

    buttonRow.appendChild(btn);
buttonRow.appendChild(deleteBtn);

wrapper.appendChild(img);
wrapper.appendChild(buttonRow);
    preview.appendChild(wrapper);
  });
});

// Save crop
document.getElementById("saveCrop").onclick = () => {
  if (!cropper) return;

  const canvas = cropper.getCroppedCanvas({
    width: 1200,
    height: 1200
  });

  if (currentImageElement) {
    currentImageElement.src = canvas.toDataURL("image/jpeg", 0.95);
  }

  cropper.destroy();
  cropper = null;

  document.getElementById("cropModal").style.display = "none";
  imageContainer.innerHTML = "";
};

// Submit photos
document.getElementById("submitPhotos").addEventListener("click", async () => {
  const images = document.querySelectorAll("#previewContainer img");
  const customerName = customerNameInput.value.trim() || "NoName";

  if (images.length === 0) {
    alert("No images to submit");
    return;
  }

  const base64Array = Array.from(images).map(img => img.src);

  const status = document.getElementById("uploadStatus");

// Show message
status.style.display = "block";
status.innerText = "Uploading... Do not leave this page.";

try {
  await fetch("https://script.google.com/macros/s/AKfycbyRX1YdjnGHm94M2LCFg8Wq4XCjPLguCZxTucwlH5J05tfGQwUnqi2WoMmo0XKmnjt3/exec?name=" + encodeURIComponent(customerName), {
    method: "POST",
    body: JSON.stringify(base64Array),
    mode: "no-cors"
  });

  status.innerText = "Upload complete ✅";

} catch (err) {
  status.innerText = "Upload failed ❌";
}

  // Reset preview for next attempt AFTER short delay
setTimeout(() => {
  preview.innerHTML = "";
  customerNameInput.value = "";
  document.getElementById("submitPhotos").style.display = "none";

  status.style.display = "none";
  status.innerText = "Uploading... Do not leave this page.";
}, 2000);
});
</script>

</body>
</html>
