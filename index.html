<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories on a Magnet Upload</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;margin:0;padding:40px;}
.container{background:white;max-width:500px;margin:auto;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
button{background:#000;color:#fff;border:none;padding:15px 25px;font-size:18px;border-radius:8px;cursor:pointer;}
#previewContainer img{margin-top:10px;border-radius:8px;width:150px;}
input[type=text]{padding:12px;font-size:18px;width:80%;border-radius:6px;border:1px solid #ccc;margin-top:15px;}
</style>
</head>

<body>

<div class="container">
<h1>Stories on a Magnet</h1>

<label id="selectPhotosBtn" style="display:inline-block;background:#000;color:#fff;padding:15px 25px;border-radius:8px;cursor:pointer;">
Select Photos
</label>

<input type="file" id="photoInput" accept="image/*" style="display:none;" multiple>

<div id="previewContainer"></div>

<!-- Added Name Input -->
<input type="text" id="customerName" placeholder="Enter Your Name">

<br><br>
<button id="submitPhotos" style="display:none;">Submit Photos</button>

<div id="cropModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999;padding:20px;text-align:center;">
  <h2>Edit Photo</h2>
  <div id="imageContainer"></div>
  <br><br>
  <button id="saveCrop">Save Crop</button>
</div>

</div>

<script>
let cropper = null;
let currentImageElement = null;

const input = document.getElementById("photoInput");
const preview = document.getElementById("previewContainer");
const imageContainer = document.getElementById("imageContainer");
const customerNameInput = document.getElementById("customerName");

// Open file picker
document.getElementById("selectPhotosBtn").onclick = () => {
  input.value = "";
  input.click();
};

// Handle file selection
input.addEventListener("change", (e) => {
  preview.innerHTML = "";
  document.getElementById("submitPhotos").style.display = "inline-block";

  Array.from(e.target.files).forEach(file => {

    const wrapper = document.createElement("div");
    wrapper.style.marginTop = "20px";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    const btn = document.createElement("button");
    btn.innerText = "Edit";
    btn.style.marginLeft = "10px";

    btn.onclick = () => {
      // Scoped variables per click
      const fileCopy = file;
      const imgCopy = img;

      if (cropper) {
        cropper.destroy();
        cropper = null;
      }

      imageContainer.innerHTML = "";

      const reader = new FileReader();
      reader.onload = function(event) {
        const newImg = document.createElement("img");
        newImg.style.maxWidth = "90%";
        newImg.style.maxHeight = "70vh";
        newImg.src = event.target.result;

        imageContainer.appendChild(newImg);
        document.getElementById("cropModal").style.display = "block";

        // ✅ New reliable fix: wait for image to load before initializing Cropper
        newImg.onload = () => {
          cropper = new Cropper(newImg, {
            aspectRatio: 1,
            viewMode: 1,
            dragMode: "move",
            autoCropArea: 1,
            cropBoxMovable: false,
            cropBoxResizable: false,
            movable: true,
            zoomable: true,
            background: false
          });
          currentImageElement = imgCopy;
        };
      };
      reader.readAsDataURL(fileCopy);
    };

    wrapper.appendChild(img);
    wrapper.appendChild(btn);
    preview.appendChild(wrapper);
  });
});

// Save crop
document.getElementById("saveCrop").onclick = () => {
  if (!cropper) return;

  const canvas = cropper.getCroppedCanvas({
    width: 1200,
    height: 1200
  });

  if (currentImageElement) {
    currentImageElement.src = canvas.toDataURL("image/jpeg", 0.95);
  }

  cropper.destroy();
  cropper = null;

  document.getElementById("cropModal").style.display = "none";
  imageContainer.innerHTML = "";
};

// Submit photos
document.getElementById("submitPhotos").addEventListener("click", async () => {
  const images = document.querySelectorAll("#previewContainer img");
  const customerName = customerNameInput.value.trim() || "NoName";

  if (images.length === 0) {
    alert("No images to submit");
    return;
  }

  const base64Array = Array.from(images).map(img => img.src);

  try {
    await fetch("https://script.google.com/macros/s/AKfycbyRX1YdjnGHm94M2LCFg8Wq4XCjPLguCZxTucwlH5J05tfGQwUnqi2WoMmo0XKmnjt3/exec?name=" + encodeURIComponent(customerName), {
      method: "POST",
      body: JSON.stringify(base64Array),
      mode: "no-cors"
    });
    alert("Upload sent ✅");
  } catch (err) {
    alert("Upload failed: " + err);
  }

  // Reset preview for next attempt
  preview.innerHTML = "";
  customerNameInput.value = "";
  document.getElementById("submitPhotos").style.display = "none";
});
</script>

</body>
</html>
